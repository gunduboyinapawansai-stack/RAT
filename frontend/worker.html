<!DOCTYPE html>

<html>

<head>
<title>RAT Worker POS</title>

<style>

body{
  font-family:Arial;
  text-align:center;
}

.menu{
  margin-top:30px;
}

button{
  padding:10px;
  margin:5px;
  font-size:16px;
}

#cart,#receipt{
  margin-top:20px;
  text-align:left;
  display:inline-block;
}

#cart li,#receipt li{
  margin:5px 0;
}

</style>

</head>

<body>

<h1>RAT Worker POS</h1>

<h3>Select Item</h3>

<div class="menu" id="menuButtons">
Loading menu...
</div>

<h3>Cart</h3>
<ul id="cart"></ul>

<h3 id="total">Total: ₹0</h3>

<h3>Payment Mode</h3>

<select id="payment">
<option>Cash</option>
<option>UPI</option>
</select>

<br><br>

<button onclick="sendOrder()">Submit Order</button>

<h3>Receipt Preview</h3>
<ul id="receipt"></ul>

<script>

const API = "https://rat-1-2vvw.onrender.com";

let prices = {};
let cart = {};


// =====================
// LOAD MENU FROM DATABASE
// =====================

function loadMenu(){

  fetch(API + "/menu")

  .then(res => res.json())

  .then(data => {

    const menuDiv = document.getElementById("menuButtons");

    menuDiv.innerHTML = "";

    prices = {};

    data.forEach(item => {

      prices[item.name] = item.price;

      const btn = document.createElement("button");

      btn.innerText = item.name + " ₹" + item.price;

      btn.onclick = () => addItem(item.name);

      menuDiv.appendChild(btn);

    });

  })

  .catch(() => {

    document.getElementById("menuButtons").innerText = "Failed to load menu";

  });

}


// =====================
// CART FUNCTIONS
// =====================

function addItem(item){

  if(cart[item]) cart[item]++;
  else cart[item] = 1;

  updateCart();

}


function increase(item){

  cart[item]++;
  updateCart();

}


function decrease(item){

  cart[item]--;

  if(cart[item] === 0)
    delete cart[item];

  updateCart();

}


// =====================
// UPDATE CART
// =====================

function updateCart(){

  let list = document.getElementById("cart");
  let receipt = document.getElementById("receipt");

  list.innerHTML = "";
  receipt.innerHTML = "";

  let total = 0;

  for(let item in cart){

    let qty = cart[item];
    let price = prices[item] || 0;

    let subtotal = qty * price;

    total += subtotal;

    list.innerHTML += `
    <li>
    ${item} ₹${price}
    <button onclick="decrease('${item}')">-</button>
    ${qty}
    <button onclick="increase('${item}')">+</button>
    </li>`;

    receipt.innerHTML += `<li>${item} x${qty} = ₹${subtotal}</li>`;

  }

  receipt.innerHTML += `<li><strong>Total: ₹${total}</strong></li>`;

  document.getElementById("total").innerText = "Total: ₹" + total;

}


// =====================
// SEND ORDER
// =====================

function sendOrder(){

  if(Object.keys(cart).length === 0){
    alert("Cart is empty");
    return;
  }

  const payment = document.getElementById("payment").value;

  const stall_id = localStorage.getItem("stall_id");
  const worker_id = localStorage.getItem("worker_id");

  fetch(API + "/order", {

    method:"POST",

    headers:{
      "Content-Type":"application/json"
    },

    body:JSON.stringify({

      items:cart,
      payment_mode:payment,
      stall_id:stall_id,
      worker_id:worker_id

    })

  })

  .then(res => res.json())

  .then(() => {

    alert("Order Sent");

    cart = {};

    updateCart();

  })

  .catch(() => {

    alert("Order failed");

  });

}


// =====================
// AUTO LOAD MENU
// =====================

loadMenu();

</script>

</body>

</html>
