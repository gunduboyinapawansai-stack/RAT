<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const API = "https://rat-backend.onrender.com"; // Render URL
const socket = io(API); // Connect to Socket.IO

function loadOrders(){
  fetch(API + "/orders")
    .then(res => res.json())
    .then(data => displayOrders(data));
}

function displayOrders(data){
  let list = document.getElementById("orders");
  list.innerHTML = "";
  data.forEach(o => {
    let itemsText = "";
    for(let item in o.items){
      itemsText += item + " x" + o.items[item] + ", ";
    }
    itemsText = itemsText.slice(0,-2);
    list.innerHTML += `<tr>
      <td>${itemsText}</td>
      <td>${o.payment || "-"}</td>
      <td>${o.time || "-"}</td>
    </tr>`;
  });
}

// Listen for new orders in real-time
socket.on("newOrder", (order) => {
  let currentOrders = Array.from(document.querySelectorAll("#orders tr")).map(r => r.innerHTML);
  let itemsText = "";
  for(let item in order.items){
    itemsText += item + " x" + order.items[item] + ", ";
  }
  itemsText = itemsText.slice(0,-2);
  let newRow = `<tr>
    <td>${itemsText}</td>
    <td>${order.payment || "-"}</td>
    <td>${order.time || "-"}</td>
  </tr>`;
  document.getElementById("orders").innerHTML += newRow;
});

loadOrders(); // Load existing orders on page load
</script>
