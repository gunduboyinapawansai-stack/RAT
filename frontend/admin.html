<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>RAT Admin Dashboard</title>

<style>
body{
  font-family: Arial;
  text-align:center;
}

table{
  margin:20px auto;
  border-collapse:collapse;
  width:90%;
}

th,td{
  border:1px solid #333;
  padding:8px;
  text-align:center;
}

thead{
  background:#f2f2f2;
}

</style>

</head>

<body>

<h2>RAT Admin Dashboard</h2>

<table>

<thead>
<tr>
<th>Stall</th>
<th>Worker</th>
<th>Items</th>
<th>Payment</th>
<th>Time</th>
</tr>
</thead>

<tbody id="orders"></tbody>

</table>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const API = "https://rat-1-2vvw.onrender.com";
const socket = io(API);


/* LOAD EXISTING ORDERS */

async function loadOrders(){

  try{

    const res = await fetch(API + "/orders");

    const data = await res.json();

    displayOrders(data);

  }catch(err){

    console.error("Error loading orders:",err);

  }

}


/* DISPLAY ORDERS */

function displayOrders(data){

  const list = document.getElementById("orders");

  list.innerHTML = "";

  data.forEach(o=>{

    let itemsText = "";

    const items = o.items || {};

    for(let item in items){

      itemsText += item + " x" + items[item] + ", ";

    }

    itemsText = itemsText.slice(0,-2);

    const time = o.created_at
      ? new Date(o.created_at).toLocaleTimeString()
      : "-";

    list.innerHTML += `
    <tr>
      <td>${o.stall_id || "-"}</td>
      <td>${o.worker_name || "-"}</td>
      <td>${itemsText}</td>
      <td>${o.payment_mode || "-"}</td>
      <td>${time}</td>
    </tr>
    `;

  });

}


/* REAL TIME ORDER UPDATE */

socket.on("newOrder",(order)=>{

  const list = document.getElementById("orders");

  let itemsText = "";

  const items = order.items || {};

  for(let item in items){

    itemsText += item + " x" + items[item] + ", ";

  }

  itemsText = itemsText.slice(0,-2);

  const time = order.time || new Date().toLocaleTimeString();

  const row = `
  <tr>
    <td>${order.stall_id || "-"}</td>
    <td>${order.worker_id || "-"}</td>
    <td>${itemsText}</td>
    <td>${order.payment || "-"}</td>
    <td>${time}</td>
  </tr>
  `;

  list.innerHTML += row;

});


/* INITIAL LOAD */

loadOrders();

</script>

</body>
</html>
